<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOOCAP · Content Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --poll-ms:20000;
    --ink:#0C0F14; --panel:#141922; --panel-2:#1B212C; --raised:#212935;
    --line:#232A36; --line-2:#2D3645;
    --fg:#E7ECF3; --fg-dim:#A4ADBC; --fg-mute:#727C8C;
    --brand:#F5B544; --data:#5BD0C7;
    --red:#F4685E; --orange:#F0934E; --green:#5FC97B; --pink:#E6709E; --purple:#B98AE6;
    --r:16px; --r-sm:10px; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1100px 560px at 82% -12%, rgba(245,181,68,.07), transparent 58%),
      radial-gradient(820px 460px at -8% 108%, rgba(91,208,199,.06), transparent 55%),
      var(--ink);
    color:var(--fg); font-family:"Inter",system-ui,sans-serif; font-size:14px; line-height:1.5;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  a{color:var(--data)}
  .wrap{max-width:920px; margin:0 auto; padding:30px 24px 60px}

  /* header */
  .head{display:flex; align-items:center; gap:13px; margin-bottom:8px}
  .diamond{width:13px;height:13px;background:var(--brand);transform:rotate(45deg);border-radius:2px;box-shadow:0 0 14px rgba(245,181,68,.55)}
  .head b{font-family:"Space Grotesk",sans-serif;font-weight:700;letter-spacing:.14em;font-size:15px}
  .live{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--fg-dim)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .live.on .dot{animation:beat 2s ease-out infinite}
  .live.syncing .dot{background:var(--brand)}
  .live.stale .dot{background:var(--red)}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(95,201,123,.55)}70%{box-shadow:0 0 0 8px rgba(95,201,123,0)}100%{box-shadow:0 0 0 0 rgba(95,201,123,0)}}

  .hero{font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:34px; letter-spacing:-.02em; margin:6px 0 2px}
  .hero .nm{color:var(--brand)}
  .sub{color:var(--fg-mute); font-size:13.5px; margin-bottom:26px}

  /* summary stats */
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:13px; margin-bottom:24px}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:17px 18px}
  .stat .n{font-family:var(--mono); font-weight:700; font-size:30px; letter-spacing:-.02em; line-height:1}
  .stat .l{color:var(--fg-dim); font-size:12px; margin-top:8px}

  /* action callout */
  .action{background:linear-gradient(180deg,rgba(245,181,68,.10),rgba(245,181,68,.03));
    border:1px solid rgba(245,181,68,.3); border-radius:var(--r); padding:17px 19px; margin-bottom:26px}
  .action h3{margin:0 0 4px; font-family:"Space Grotesk",sans-serif; font-size:14px; color:var(--brand); display:flex; align-items:center; gap:8px}
  .action p{margin:0 0 10px; color:var(--fg-dim); font-size:13px}
  .action ul{margin:0; padding-left:18px; color:var(--fg)}
  .action li{margin:3px 0; font-size:13.5px}

  .group-label{font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:11px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--fg-mute); display:flex; align-items:center; gap:10px; margin:0 0 14px}
  .group-label .c{font-family:var(--mono); color:var(--data); font-size:11px}
  .group-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .group + .group{margin-top:30px}

  /* video card */
  .vid{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:18px 20px; margin-bottom:13px; transition:.18s}
  .vid:hover{border-color:var(--line-2)}
  .vid-top{display:flex; align-items:flex-start; gap:12px; margin-bottom:16px}
  .vid .ttl{flex:1; font-weight:600; font-size:15px; line-height:1.35}
  .tag{font-size:10px; font-weight:600; padding:3px 9px; border-radius:99px; white-space:nowrap; letter-spacing:.03em; flex-shrink:0}
  .tag.personal{color:var(--data); background:rgba(91,208,199,.12)}
  .tag.sponsor{color:var(--pink); background:rgba(230,112,158,.14)}

  /* journey track */
  .track{display:flex; align-items:center; gap:0}
  .step{flex:1; display:flex; flex-direction:column; align-items:center; gap:7px; position:relative; cursor:default}
  .step .pip{width:14px;height:14px;border-radius:50%; background:var(--panel-2); border:2px solid var(--line-2); z-index:2; transition:.2s}
  .step .nm{font-size:10.5px; color:var(--fg-mute); font-weight:500; text-align:center; transition:.2s}
  .step .bar{position:absolute; top:6px; left:50%; width:100%; height:2px; background:var(--line); z-index:1}
  .step:last-child .bar{display:none}
  .step.done .pip{background:var(--data); border-color:var(--data)}
  .step.done .bar{background:var(--data)}
  .step.current .pip{background:var(--brand); border-color:var(--brand); box-shadow:0 0 0 4px rgba(245,181,68,.18)}
  .step.current .nm{color:var(--brand); font-weight:600}
  .step.published .pip{background:var(--green); border-color:var(--green)}
  .step.published .bar{background:var(--green)}
  .step.published.current .pip{box-shadow:0 0 0 4px rgba(95,201,123,.2)}
  .step.published.current .nm{color:var(--green)}

  .vid-foot{display:flex; align-items:center; gap:14px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line);
    font-family:var(--mono); font-size:11.5px; color:var(--fg-mute)}
  .vid-foot .live-link{margin-left:auto; color:var(--green); font-weight:500}
  .vid-foot .real{color:var(--fg-dim)}

  .banner{display:none; background:rgba(245,181,68,.08); border:1px solid rgba(245,181,68,.25); border-radius:var(--r-sm);
    padding:10px 14px; font-family:var(--mono); font-size:11.5px; color:var(--brand); margin-bottom:22px}
  body.demo .banner{display:block}
  .gate{text-align:center; padding:80px 20px; color:var(--fg-mute); font-family:var(--mono); font-size:13px}

  .foot{margin-top:40px; padding-top:18px; border-top:1px solid var(--line); color:var(--fg-mute);
    font-family:var(--mono); font-size:11px; display:flex; gap:8px; align-items:center}

  @media(max-width:560px){
    .hero{font-size:26px} .stats{grid-template-columns:1fr 1fr} .step .nm{font-size:9px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="head">
      <div class="diamond"></div><b>NOOCAP</b>
      <div class="live on" id="live"><div class="dot"></div><span id="ago">live</span></div>
    </div>
    <div id="content">
      <div class="gate">Loading your portal…</div>
    </div>
    <div class="foot">◆ This is your live portal — bookmark it. It updates on its own.</div>
  </div>

<script>
const JOURNEY=[
 {stage:"Filming",statuses:["Ready to Film"]},
 {stage:"Production",statuses:["Awaiting Editor Assignment","Ready for Editing","Editing in Progress"]},
 {stage:"Review",statuses:["Awaiting Review","Revisions Requested","Revisions Complete"]},
 {stage:"Approved",statuses:["Green Light"]},
 {stage:"Published",statuses:["Posted"]},
];
const STAGE_INDEX=Object.fromEntries(JOURNEY.flatMap((j,i)=>j.statuses.map(s=>[s,i])));
const POLL=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--poll-ms'))||20000;
const key=new URLSearchParams(location.search).get('k')||new URLSearchParams(location.search).get('key');
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const $=id=>document.getElementById(id);

function fmtDate(iso){ return iso? new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : null; }
function relTime(iso){ if(!iso) return ""; const m=Math.round((Date.now()-new Date(iso))/6e4);
  if(m<60) return m+"m ago"; const h=Math.round(m/60); if(h<24) return h+"h ago"; return Math.round(h/24)+"d ago"; }

function track(realStatus){
  const cur = STAGE_INDEX[realStatus] ?? 1;
  const isPub = realStatus==="Posted";
  return `<div class="track">`+JOURNEY.map((j,i)=>{
    let cls="step";
    if(i<cur) cls+=" done";
    if(i===cur) cls+=" current";
    if(j.stage==="Published" && (i<cur || i===cur)) cls+=" published";
    const tip = i===cur ? `currently: ${realStatus}` : j.statuses.join(" · ");
    return `<div class="${cls}" title="${esc(tip)}"><div class="bar"></div><div class="pip"></div><div class="nm">${j.stage}</div></div>`;
  }).join("")+`</div>`;
}

function videoCard(v){
  const typeCls = v.type==="Sponsor"?"sponsor":"personal";
  const published = v.realStatus==="Posted";
  let foot="";
  if(published){
    foot=`<span class="real">Published ${fmtDate(v.postedAt)||""}</span>`+
         (v.postedLink?`<a class="live-link" href="${esc(v.postedLink)}" target="_blank" rel="noopener">watch live →</a>`:"");
  }else{
    const tgt=fmtDate(v.targetPostDate);
    foot=`<span class="real">Stage: ${esc(v.realStatus||"—")}</span>`+
         (tgt?`<span style="margin-left:auto">target ${tgt}</span>`:`<span style="margin-left:auto">updated ${relTime(v.updated)}</span>`);
  }
  return `<div class="vid">
    <div class="vid-top"><div class="ttl">${esc(v.title)}</div>
      <span class="tag ${typeCls}">${esc(v.type||"Video")}</span></div>
    ${track(v.realStatus)}
    <div class="vid-foot">${foot}</div>
  </div>`;
}

function render(d){
  const vids=d.videos||[];
  const waiting=vids.filter(v=>v.realStatus==="Ready to Film");
  const live=vids.filter(v=>v.realStatus!=="Posted");
  const published=vids.filter(v=>v.realStatus==="Posted")
    .sort((a,b)=>new Date(b.postedAt||0)-new Date(a.postedAt||0));
  const postedThisWeek=published.filter(v=>v.postedAt && (Date.now()-new Date(v.postedAt))/864e5<=7).length;

  let html=`<div class="banner" id="banner">◆ Preview — share <code>/portal.html?k=&lt;creator-key&gt;</code> for each creator's live link.</div>`;
  html+=`<div class="hero">Hey <span class="nm">${esc(d.creator)}</span> 👋</div>`;
  html+=`<div class="sub">Here's exactly where every one of your videos stands, updated live from the NOOCAP pipeline.</div>`;
  html+=`<div class="stats">
    <div class="stat"><div class="n" style="color:var(--green)">${postedThisWeek}</div><div class="l">Published this week</div></div>
    <div class="stat"><div class="n" style="color:var(--data)">${live.length}</div><div class="l">In progress</div></div>
    <div class="stat"><div class="n" style="color:${waiting.length?'var(--brand)':'var(--fg-mute)'}">${waiting.length}</div><div class="l">Waiting on you</div></div>
  </div>`;

  if(waiting.length){
    html+=`<div class="action"><h3>📹 We're ready when you are</h3>
      <p>Send raw footage for these and editing starts right away:</p>
      <ul>${waiting.map(v=>`<li>${esc(v.title)}</li>`).join("")}</ul></div>`;
  }

  if(live.length){
    html+=`<div class="group"><div class="group-label">In progress <span class="c">${live.length}</span></div>`;
    // sort by furthest along first
    live.sort((a,b)=>(STAGE_INDEX[b.realStatus]??0)-(STAGE_INDEX[a.realStatus]??0));
    html+=live.map(videoCard).join("")+`</div>`;
  }
  if(published.length){
    html+=`<div class="group"><div class="group-label">Published <span class="c">${published.length}</span></div>`;
    html+=published.slice(0,12).map(videoCard).join("")+`</div>`;
  }
  if(!vids.length){
    html+=`<div class="gate">No videos in the pipeline yet — they'll appear here the moment they're added.</div>`;
  }
  $("content").innerHTML=html;
}

/* sync */
let lastOk=null;
function setLive(s){ $("live").className="live "+s; }
function tickAgo(){ if(!lastOk){return;} const s=Math.round((Date.now()-lastOk)/1000);
  $("ago").textContent = s<60?"live · "+s+"s":"live · "+Math.floor(s/60)+"m"; }

async function sync(){
  setLive("syncing");
  if(!key){ render(DEMO); document.body.classList.add("demo"); setLive("on"); lastOk=Date.now(); return; }
  try{
    const res=await fetch(`/api/creator?k=${encodeURIComponent(key)}`,{cache:"no-store"});
    const data=await res.json();
    if(!res.ok||!data.ok) throw new Error(data.error||"unavailable");
    render(data); document.body.classList.remove("demo");
    lastOk=Date.now(); setLive("on"); tickAgo();
  }catch(e){
    if(!lastOk){ render(DEMO); document.body.classList.add("demo"); lastOk=Date.now(); }
    setLive("stale");
  }
}
setInterval(tickAgo,1000);
setInterval(sync,POLL);
sync();

/* demo (offline preview) */
const DEMO={ok:true,creator:"Duncan",videos:[
 {title:"AI agents will replace your whole team",type:"Personal",realStatus:"Editing in Progress",targetPostDate:new Date(Date.now()+3*864e5).toISOString(),updated:new Date(Date.now()-3*36e5).toISOString()},
 {title:"Notion as your entire operating system",type:"Personal",realStatus:"Awaiting Review",targetPostDate:new Date(Date.now()+2*864e5).toISOString(),updated:new Date(Date.now()-6*36e5).toISOString()},
 {title:"How I automate scripts with Claude",type:"Sponsor",realStatus:"Green Light",targetPostDate:new Date(Date.now()+1*864e5).toISOString(),updated:new Date(Date.now()-9*36e5).toISOString()},
 {title:"The $0 content stack",type:"Personal",realStatus:"Ready to Film",targetPostDate:null,updated:new Date(Date.now()-26*36e5).toISOString()},
 {title:"5 ElevenLabs tricks nobody uses",type:"Sponsor",realStatus:"Posted",postedAt:new Date(Date.now()-2*864e5).toISOString(),postedLink:"https://instagram.com",updated:new Date(Date.now()-2*864e5).toISOString()},
 {title:"Why most AI creators fail",type:"Personal",realStatus:"Posted",postedAt:new Date(Date.now()-5*864e5).toISOString(),postedLink:"https://instagram.com",updated:new Date(Date.now()-5*864e5).toISOString()},
]};
</script>
</body>
</html>
